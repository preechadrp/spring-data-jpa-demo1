spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/demojpa
    driver-class-name: org.mariadb.jdbc.Driver
    username: root
    password: a1234
    # HikariCP Connection Pool Configuration
    hikari:
      maximum-pool-size: 3
      minimum-idle: 2
      connection-timeout: 30000
      auto-commit: true
  # Spring SQL Initialization
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: create
      #naming:
        # เปลี่ยนมาใช้ Physical Naming Strategy แบบ Standard เพื่อให้ใช้ชื่อตรงตามที่เราพิมพ์ในโค้ดเป๊ะๆ (ตาม @Column)  แต่มันจะมีผลกับทุก Entity เลยนะ
        # physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl  
    show-sql: true
    